function todayStr() {

  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function setSyncStatus(text) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = text;
}

function ensureAuth() {
  if (!authReadyPromise) {
    authReadyPromise = signInAnonymously(auth).catch(err => {
      console.error(err);
      setSyncStatus('Sync error: could not connect');
    });
  }
  return authReadyPromise;
}

function populateSettingsInputs() {
  document.getElementById('p1Name').value = settings.p1;
  document.getElementById('p2Name').value = settings.p2;
}

function applyRemoteData(data) {
  applyingRemoteUpdate = true;
  settings = data.settings || settings;
  trainingLog = data.trainingLog || { p1: [], p2: [] };
  populateSettingsInputs();
  try { localStorage.setItem('training_settings', JSON.stringify(settings)); } catch (err) {}
  try { localStorage.setItem('training_log', JSON.stringify(trainingLog)); } catch (err) {}
  renderAll();
  applyingRemoteUpdate = false;
}

function subscribeToCloud(code) {
  if (unsubscribeCloud) { unsubscribeCloud(); unsubscribeCloud = null; }
  if (!code) { setSyncStatus('Not syncing — enter a sync code above to share data across devices.'); return; }
  setSyncStatus('Connecting…');
  ensureAuth().then(() => {
    const ref = doc(db, 'training', code);
    unsubscribeCloud = onSnapshot(ref, (snap) => {
      if (snap.exists()) {
        applyRemoteData(snap.data());
      } else {
        setDoc(ref, { settings, trainingLog }).catch(err => console.error(err));
      }
      setSyncStatus('Synced as "' + code + '"');
    }, (err) => {
      console.error(err);
      setSyncStatus('Sync error: ' + err.message);
    });
  });
}

async function pushToCloud(opts = {}) {
  if (!coupleCode || applyingRemoteUpdate) return;
  try {
    await ensureAuth();
    const writeOpts = opts.replace ? {} : { merge: true };
    await setDoc(doc(db, 'training', coupleCode), { settings, trainingLog }, writeOpts);
  } catch (err) {
    console.error(err);
    setSyncStatus('Sync error: could not save');
  }
}

function onSyncCodeChange() {
  const code = document.getElementById('syncCode').value.trim();
  coupleCode = code;
  try { localStorage.setItem('training_coupleCode', code); } catch (err) {}
  subscribeToCloud(code);
}

async function saveSettings() {
  settings.p1 = document.getElementById('p1Name').value || 'You';
  settings.p2 = document.getElementById('p2Name').value || 'Partner';
  try { localStorage.setItem('training_settings', JSON.stringify(settings)); } catch (err) {}
  renderPersonTabs();
  pushToCloud();
}

function renderPersonTabs() {
  const el = document.getElementById('personTabs');
  el.innerHTML = `
    <button data-p="p1" class="${activePerson === 'p1' ? 'active' : ''}">${settings.p1}</button>
    <button data-p="p2" class="${activePerson === 'p2' ? 'active' : ''}">${settings.p2}</button>
  `;
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { activePerson = b.dataset.p; renderAll(); });
  });
}

function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = DAY_ORDER.map(d => `<button data-d="${d}" class="${activeDay === d ? 'active' : ''}">${DAY_LABELS[d]}</button>`).join('');
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { activeDay = b.dataset.d; activeVariant = 'gym'; renderContent(); updateActiveTabStyles(); });
  });
}

function updateActiveTabStyles() {
  document.querySelectorAll('#dayTabs button').forEach(b => b.classList.toggle('active', b.dataset.d === activeDay));
}

function exRow([name, reps, url]) {
  const link = url
    ? `<span class="ex-link"><a href="${url}" target="_blank" rel="noopener">&#9654; Watch</a></span>`
    : '';
  return `<div class="ex-row"><span class="ex-name">${name}</span><span class="ex-reps">${reps}</span>${link}</div>`;
}

function renderOverview(plan) {
  return `
    <h2>Overview</h2>
    <p class="card-sub">${plan.goal}</p>
    <div class="section-title">Flexible scheduling rules</div>
    <ul class="rule-list">${plan.rules.map(r => `<li>${r}</li>`).join('')}</ul>
    <div class="section-title">Muscle frequency check</div>
    <table class="freq-table">
      <tr><th>Muscle group</th><th>Hit on</th><th>Frequency</th></tr>
      ${plan.frequency.map(row => `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`).join('')}
    </table>
    <div class="section-title">Notes</div>
    <ul class="rule-list">${plan.notes.map(n => `<li>${n}</li>`).join('')}</ul>
  `;
}

function dayLogs(person, dayKey) {
  return (trainingLog[person] || []).filter(l => l.day === dayKey).sort((a, b) => b.date.localeCompare(a.date));
}

function findLog(person, dayKey, date, variant) {
  return (trainingLog[person] || []).find(l => l.day === dayKey && l.date === date && l.variant === variant);
}

function findPreviousLog(person, dayKey, variant, beforeDate) {
  const arr = (trainingLog[person] || [])
    .filter(l => l.day === dayKey && l.variant === variant && l.date < beforeDate)
    .sort((a, b) => b.date.localeCompare(a.date));
  return arr[0] || null;
}

const expandedLogs = new Set();
function logKey(date, variant) { return date + '|' + variant; }

function renderLogDetail(l, prev) {
  return Object.entries(l.weights).map(([name, w]) => {
    let deltaHtml = '<span class="pl-ex-delta flat">first time</span>';
    if (prev && prev.weights[name] !== undefined) {
      const d = Math.round((w - prev.weights[name]) * 100) / 100;
      if (d > 0) deltaHtml = `<span class="pl-ex-delta up">&#9650; +${d}kg</span>`;
      else if (d < 0) deltaHtml = `<span class="pl-ex-delta down">&#9660; ${d}kg</span>`;
      else deltaHtml = '<span class="pl-ex-delta flat">no change</span>';
    }
    return `<div class="pl-ex-row"><span class="pl-ex-name">${name}</span><span class="pl-ex-weight">${w}kg</span>${deltaHtml}</div>`;
  }).join('');
}

function renderDay(day, dayKey) {
  const hasVariants = !!(day.gym && day.home);
  const list = hasVariants ? (activeVariant === 'gym' ? day.gym : day.home) : day.gym;
  const logs = dayLogs(activePerson, dayKey);
  return `
    <h2>${day.title}</h2>
    <p class="card-sub">${day.duration}</p>
    ${hasVariants ? `
      <div class="variant-tabs">
        <button id="variantGym" class="${activeVariant === 'gym' ? 'active' : ''}">Gym</button>
        <button id="variantHome" class="${activeVariant === 'home' ? 'active' : ''}">Home (dumbbell)</button>
      </div>` : ''}
    ${list.map(exRow).join('')}
    ${day.footnote ? `<p class="note" style="margin-top:12px;">${day.footnote}</p>` : ''}

    <div class="section-title">Log this workout</div>
    <div class="log-date-row">
      <label>Date</label>
      <input type="date" id="logDate">
    </div>
    <div id="logWeights">
      ${list.map((ex, i) => `<div class="log-weight-row"><span class="lw-name">${ex[0]}</span><input type="number" id="logW_${i}" placeholder="kg" min="0"></div>`).join('')}
    </div>
    <button class="primary" id="saveLogBtn">Save log</button>

    <div class="section-title" style="margin-top:20px;">Past sessions</div>
    <div id="pastLogs">
      ${logs.length === 0 ? '<div class="empty-state" style="padding:1rem 0;">No sessions logged yet.</div>' : logs.map(l => {
        const key = logKey(l.date, l.variant);
        const open = expandedLogs.has(key);
        const prev = findPreviousLog(activePerson, dayKey, l.variant, l.date);
        const count = Object.keys(l.weights).length;
        return `<div class="past-log-row" data-date="${l.date}" data-variant="${l.variant}">
          <div class="pl-header">
            <span class="pl-chevron ${open ? 'open' : ''}">&#9656;</span>
            <span class="pl-date">${l.date}</span>
            <span class="pl-meta">${l.variant === 'home' ? 'Home' : 'Gym'} &middot; ${count} exercise${count === 1 ? '' : 's'}</span>
            <button class="pl-edit" data-date="${l.date}" data-variant="${l.variant}" title="Load into form">&#9998;</button>
            <button class="pl-del" data-date="${l.date}" data-variant="${l.variant}" title="Delete">&times;</button>
          </div>
          <div class="pl-detail ${open ? 'open' : ''}">${renderLogDetail(l, prev)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function loadLogIntoForm(dayKey, list, variant) {
  const dateInput = document.getElementById('logDate');
  const date = dateInput.value;
  const existing = findLog(activePerson, dayKey, date, variant);
  list.forEach((ex, i) => {
    const input = document.getElementById('logW_' + i);
    if (!input) return;
    input.value = existing && existing.weights[ex[0]] !== undefined ? existing.weights[ex[0]] : '';
  });
}

function saveLog(dayKey, list, variant) {
  const date = document.getElementById('logDate').value || todayStr();
  const weights = {};
  list.forEach((ex, i) => {
    const v = parseFloat(document.getElementById('logW_' + i).value);
    if (!isNaN(v)) weights[ex[0]] = v;
  });
  if (Object.keys(weights).length === 0) { alert('Enter at least one weight.'); return; }
  if (!trainingLog[activePerson]) trainingLog[activePerson] = [];
  const arr = trainingLog[activePerson];
  const idx = arr.findIndex(l => l.day === dayKey && l.date === date && l.variant === variant);
  const entry = { date, day: dayKey, variant, weights };
  if (idx >= 0) arr[idx] = entry; else arr.push(entry);
  try { localStorage.setItem('training_log', JSON.stringify(trainingLog)); } catch (err) {}
  pushToCloud();
  renderContent();
}

function deleteLog(dayKey, date, variant) {
  const arr = trainingLog[activePerson] || [];
  const idx = arr.findIndex(l => l.day === dayKey && l.date === date && l.variant === variant);
  if (idx >= 0) arr.splice(idx, 1);
  try { localStorage.setItem('training_log', JSON.stringify(trainingLog)); } catch (err) {}
  pushToCloud();
  renderContent();
}

let pendingViewLog = null;

function renderBackCare(bc) {
  return `
    <h2>Back care</h2>
    <p class="card-sub">${bc.intro}</p>
    ${bc.sections.map(s => `
      <div class="section-title">${s.title}</div>
      ${s.items.map(exRow).join('')}
    `).join('')}
    <p class="note" style="margin-top:14px;">${bc.tightNote}</p>
  `;
}

function renderContent() {
  const plan = currentPlan();
  const contentEl = document.getElementById('content');
  if (!plan) {
    contentEl.innerHTML = `<div class="empty-state">No training plan added for Partner yet.</div>`;
    return;
  }
  if (activeDay === 'overview') {
    contentEl.innerHTML = renderOverview(plan.overview);
  } else if (activeDay === 'backcare') {
    contentEl.innerHTML = renderBackCare(plan.backcare);
  } else {
    const day = plan[activeDay];
    contentEl.innerHTML = renderDay(day, activeDay);
    const gymBtn = document.getElementById('variantGym');
    const homeBtn = document.getElementById('variantHome');
    if (gymBtn) gymBtn.addEventListener('click', () => { activeVariant = 'gym'; renderContent(); });
    if (homeBtn) homeBtn.addEventListener('click', () => { activeVariant = 'home'; renderContent(); });

    const hasVariants = !!(day.gym && day.home);
    const list = hasVariants ? (activeVariant === 'gym' ? day.gym : day.home) : day.gym;

    const dateInput = document.getElementById('logDate');
    if (dateInput) {
      dateInput.max = todayStr();
      dateInput.value = pendingViewLog ? pendingViewLog.date : todayStr();
      loadLogIntoForm(activeDay, list, activeVariant);
      dateInput.addEventListener('change', () => loadLogIntoForm(activeDay, list, activeVariant));
    }
    pendingViewLog = null;

    const saveBtn = document.getElementById('saveLogBtn');
    if (saveBtn) saveBtn.addEventListener('click', () => saveLog(activeDay, list, activeVariant));

    document.querySelectorAll('.pl-del').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteLog(activeDay, btn.dataset.date, btn.dataset.variant);
      });
    });
    document.querySelectorAll('.pl-edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const date = btn.dataset.date;
        const variant = btn.dataset.variant;
        if (variant !== activeVariant) {
          activeVariant = variant;
          pendingViewLog = { date };
          renderContent();
        } else {
          document.getElementById('logDate').value = date;
          loadLogIntoForm(activeDay, list, activeVariant);
        }
      });
    });
    document.querySelectorAll('.pl-header').forEach(header => {
      header.addEventListener('click', () => {
        const row = header.closest('.past-log-row');
        const key = logKey(row.dataset.date, row.dataset.variant);
        if (expandedLogs.has(key)) expandedLogs.delete(key); else expandedLogs.add(key);
        renderContent();
      });
    });
  }
}

function renderAll() {
  renderPersonTabs();
  renderDayTabs();
  renderContent();
}

function setSetupCollapsed(collapsed) {
  document.getElementById('setupBody').classList.toggle('collapsed', collapsed);
  document.getElementById('setupArrow').innerHTML = collapsed ? '&#9656;' : '&#9662;';
  try { localStorage.setItem('training_setupCollapsed', collapsed ? '1' : '0'); } catch (err) {}
}

function loadData() {
  try {
    const s = localStorage.getItem('training_settings');
    settings = s ? JSON.parse(s) : settings;
  } catch (err) {}
  try {
    trainingLog = JSON.parse(localStorage.getItem('training_log') || '{}');
    trainingLog.p1 = trainingLog.p1 || [];
    trainingLog.p2 = trainingLog.p2 || [];
  } catch (err) { trainingLog = { p1: [], p2: [] }; }

  populateSettingsInputs();
  renderAll();

  try { coupleCode = localStorage.getItem('training_coupleCode') || ''; } catch (err) { coupleCode = ''; }
  document.getElementById('syncCode').value = coupleCode;
  subscribeToCloud(coupleCode);
}

document.getElementById('p1Name').addEventListener('change', saveSettings);
document.getElementById('p2Name').addEventListener('change', saveSettings);
document.getElementById('syncCode').addEventListener('change', onSyncCodeChange);
document.getElementById('setupToggle').addEventListener('click', () => {
  setSetupCollapsed(!document.getElementById('setupBody').classList.contains('collapsed'));
});
let initialSetupCollapsed = true;
try { initialSetupCollapsed = localStorage.getItem('training_setupCollapsed') !== '0'; } catch (err) {}
setSetupCollapsed(initialSetupCollapsed);

loadData();
</script>
</body>
</html>
