<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training plan</title>
<link rel="icon" type="image/png" href="icon-training.png">
<link rel="apple-touch-icon" href="icon-training.png">
<style>
  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c9c6ba;
    --text: #22201b;
    --text-secondary: #6b6858;
    --text-muted: #9a9787;
    --accent: #3d6da8;
    --accent-text: #ffffff;
    --p1: #3d6da8;
    --p2: #a8467a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a17; --card: #262420; --border: #3a3730; --border-strong: #4d4a40;
      --text: #f1efe8; --text-secondary: #b4b0a3; --text-muted: #858173;
      --accent: #7fb0e8; --accent-text: #1c1a17;
      --p1: #7fb0e8; --p2: #e090bb;
    }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:1.5rem 1rem 3rem; }
  .wrap { max-width: 720px; margin:0 auto; }
  h1 { font-size:20px; font-weight:600; margin:0 0 4px; }
  .sub { color:var(--text-secondary); font-size:14px; margin:0 0 1.25rem; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.1rem 1.25rem; margin-bottom:1rem; }
  .card h2 { font-size:16px; font-weight:600; margin:0 0 4px; }
  .card .card-sub { font-size:13px; color:var(--text-secondary); margin:0 0 14px; }
  .person-tabs { display:flex; gap:6px; margin-bottom:12px; }
  .person-tabs button { flex:1; padding:8px; border:1px solid var(--border-strong); border-radius:8px; background:var(--card); color:var(--text); font-size:13px; cursor:pointer; }
  .person-tabs button.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); font-weight:600; }
  .day-tabs { display:flex; gap:6px; margin-bottom:1rem; overflow-x:auto; padding-bottom:2px; }
  .day-tabs button { flex-shrink:0; padding:8px 14px; border:1px solid var(--border-strong); border-radius:100px; background:var(--card); color:var(--text); font-size:13px; cursor:pointer; white-space:nowrap; }
  .day-tabs button.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); font-weight:600; }
  .variant-tabs { display:flex; gap:6px; margin-bottom:14px; }
  .variant-tabs button { padding:6px 12px; border:1px solid var(--border-strong); border-radius:8px; background:var(--bg); color:var(--text); font-size:12px; cursor:pointer; }
  .variant-tabs button.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); font-weight:600; }
  .ex-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .ex-row:last-child { border-bottom:none; }
  .ex-name { flex:1; min-width:0; font-size:14px; }
  .ex-reps { font-size:12px; color:var(--text-muted); flex-shrink:0; white-space:nowrap; }
  .ex-link { flex-shrink:0; }
  .ex-link a { display:inline-block; padding:5px 10px; border:1px solid var(--accent); border-radius:6px; color:var(--accent); text-decoration:none; font-size:12px; white-space:nowrap; }
  .section-title { font-size:13px; font-weight:600; color:var(--text-secondary); margin:18px 0 6px; }
  .section-title:first-child { margin-top:0; }
  .note { font-size:13px; color:var(--text-secondary); line-height:1.5; margin:0 0 10px; }
  .freq-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
  .freq-table th, .freq-table td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
  .freq-table th { color:var(--text-secondary); font-weight:600; font-size:12px; }
  .rule-list { margin:0; padding-left:1.1rem; font-size:13px; color:var(--text-secondary); line-height:1.6; }
  .empty-state { text-align:center; color:var(--text-muted); font-size:13px; padding:2rem 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Training plan</h1>
  <p class="sub">Upper-body focus with tennis flexibility — 5-day rotation, 30-60 min sessions.</p>

  <div class="person-tabs" id="personTabs"></div>
  <div class="day-tabs" id="dayTabs"></div>

  <div class="card" id="content"></div>
</div>

<script>
function gsearch(term) {
  return 'https://www.google.com/search?q=' + encodeURIComponent(term + ' site:muscleandstrength.com');
}

const DAY_ORDER = ['overview', 'day1', 'day2', 'day3', 'day4', 'day5', 'backcare'];
const DAY_LABELS = { overview: 'Overview', day1: 'Day 1', day2: 'Day 2', day3: 'Day 3', day4: 'Day 4', day5: 'Day 5', backcare: 'Back care' };

const PLAN_P1 = {
  overview: {
    goal: 'Upper-body focus while maintaining lower body, muscle maintenance/build + fat loss, better conditioning, compatible with playing tennis on unpredictable days.',
    rules: [
      'Tennis days vary week to week, so this is a <strong>rotation, not a fixed weekly calendar</strong> — do the 5 days in any order that fits your week.',
      '<strong>Played tennis today or yesterday?</strong> Skip Day 3 (legs) or Day 5 (conditioning) that session — do an upper day instead. Tennis already loads legs and cardio hard.',
      '<strong>Avoid two upper days back-to-back</strong> where possible, so shoulders and elbows get at least a day between sessions.',
      '<strong>Every upper day opens with 5 minutes of rotator cuff / shoulder prehab</strong> — serves and overhead shots load the same joints as pressing.'
    ],
    frequency: [
      ['Chest', 'Day 1, Day 4', '2x'],
      ['Shoulders', 'Day 1, Day 4 (+ light touch Day 5)', '2-3x'],
      ['Back', 'Day 2, Day 4 (+ Day 5)', '2-3x'],
      ['Biceps/triceps', 'Day 1, Day 2/4', '2x'],
      ['Legs', 'Day 3 only (+ light touch Day 5)', '1x direct']
    ],
    notes: [
      '<strong>Fat loss</strong> comes primarily from nutrition — this training preserves/builds muscle and adds conditioning volume, but the calorie deficit is what drives fat loss.',
      '<strong>Progression:</strong> aim to add a little weight or 1-2 reps per exercise every 1-2 weeks. If you stall for 2+ sessions in a row, hold the weight and focus on form/tempo before pushing again.',
      '<strong>Med-ball rotational throws and rotational cable chops</strong> double as tennis-specific power work — they mimic trunk rotation used in groundstrokes and serves.'
    ]
  },
  day1: {
    title: 'Upper: push strength',
    duration: '45 min',
    gym: [
      ['Rotator cuff prehab (external rotation)', '3x15', 'https://www.muscleandstrength.com/exercises/cable-external-rotation'],
      ['Barbell bench press', '4x6-8', 'https://www.muscleandstrength.com/exercises/barbell-bench-press.html'],
      ['Overhead press', '3x8-10', 'https://www.muscleandstrength.com/exercises/military-press.html'],
      ['Incline dumbbell press', '3x10-12', gsearch('incline dumbbell press')],
      ['Cable lateral raise', '3x12-15', gsearch('cable lateral raise')],
      ['Triceps rope pushdown', '3x12-15', 'https://www.muscleandstrength.com/exercises/rope-tricep-extension.html']
    ],
    home: [
      ['Dumbbell external rotation', '3x15', gsearch('dumbbell external rotation')],
      ['Dumbbell bench press (floor press if no bench)', '4x8-10', gsearch('dumbbell floor press')],
      ['Dumbbell shoulder press', '3x8-10', gsearch('dumbbell shoulder press')],
      ['Dumbbell close-grip floor press', '3x10-12', gsearch('close grip floor press')],
      ['Dumbbell lateral raise', '3x12-15', gsearch('dumbbell lateral raise')],
      ['Dumbbell overhead triceps extension', '3x12-15', gsearch('dumbbell overhead tricep extension')]
    ]
  },
  day2: {
    title: 'Upper: pull strength',
    duration: '45 min',
    gym: [
      ['Rotator cuff prehab (band pull-apart)', '3x15', 'https://www.muscleandstrength.com/exercises/supinated-90-degree-band-pull-apart'],
      ['Weighted pull-ups / lat pulldown', '4x8-10', 'https://www.muscleandstrength.com/exercises/lat-pull-down.html'],
      ['Seated cable row', '3x10-12', 'https://www.muscleandstrength.com/exercises/seated-row.html'],
      ['Chest-supported dumbbell row', '3x10-12', gsearch('chest supported dumbbell row')],
      ['Face pulls', '3x15', 'https://www.muscleandstrength.com/exercises/cable-face-pull'],
      ['Wrist extensor curls (elbow health)', '2x15', gsearch('wrist extension')]
    ],
    home: [
      ['Dumbbell reverse fly (light, slow)', '3x15', gsearch('dumbbell reverse fly')],
      ['Heavy single-arm dumbbell row (main pull movement)', '4x8-10/side', gsearch('one arm dumbbell row')],
      ['Two-arm bent-over dumbbell row', '3x10-12', gsearch('dumbbell bent over row')],
      ['Chest-supported row lying face-down on a bench', '3x10-12', gsearch('chest supported dumbbell row')],
      ['Dumbbell reverse fly, wide grip', '3x15', gsearch('dumbbell reverse fly')],
      ['Dumbbell wrist extension', '2x15', gsearch('dumbbell wrist extension')]
    ],
    footnote: 'If you have a pull-up bar at home, keep pull-ups as your main pull movement instead of rows.'
  },
  day3: {
    title: 'Lower body + rotational core',
    duration: '40 min',
    gym: [
      ['Goblet squat', '3x10-12', 'https://www.muscleandstrength.com/exercises/dumbbell-goblet-squat'],
      ['Romanian deadlift', '3x10-12', 'https://www.muscleandstrength.com/exercises/romanian-deadlift'],
      ['Bulgarian split squat', '3x10/leg', 'https://www.muscleandstrength.com/exercises/one-leg-dumbbell-squat-aka-bulgarian-squat.html'],
      ['Lateral lunges', '3x10/side', gsearch('lateral lunge')],
      ['Standing calf raise', '3x15', gsearch('standing calf raise')],
      ['Rotational cable chop', '3x12/side', 'https://www.muscleandstrength.com/exercises/wood-chop.html']
    ],
    home: [
      ['Dumbbell goblet squat', '3x10-12', 'https://www.muscleandstrength.com/exercises/dumbbell-goblet-squat'],
      ['Dumbbell Romanian deadlift', '3x10-12', 'https://www.muscleandstrength.com/exercises/romanian-deadlift'],
      ['Dumbbell Bulgarian split squat (rear foot on a chair/bench)', '3x10/leg', 'https://www.muscleandstrength.com/exercises/one-leg-dumbbell-squat-aka-bulgarian-squat.html'],
      ['Dumbbell lateral lunges', '3x10/side', gsearch('lateral lunge')],
      ['Dumbbell standing calf raise', '3x15', gsearch('standing calf raise')],
      ['Single dumbbell diagonal woodchop', '3x12/side', 'https://www.muscleandstrength.com/exercises/wood-chop.html']
    ]
  },
  day4: {
    title: 'Upper: hypertrophy + finisher',
    duration: '45-50 min',
    gym: [
      ['Incline dumbbell press', '3x10-12', gsearch('incline dumbbell press')],
      ['Dumbbell shoulder press', '3x10-12', gsearch('dumbbell shoulder press')],
      ['Single-arm lat pulldown', '3x10-12/side', gsearch('single arm lat pulldown')],
      ['Lateral raise + rear delt fly (superset)', '3x15 each', gsearch('dumbbell lateral raise')],
      ['Hammer curl + skull crusher (superset)', '3x12 each', gsearch('hammer curl')],
      ['Interval finisher (bike/row)', '10-12 min', null]
    ],
    home: [
      ['Dumbbell incline press (feet elevated, or bench)', '3x10-12', gsearch('incline dumbbell press')],
      ['Dumbbell shoulder press', '3x10-12', gsearch('dumbbell shoulder press')],
      ['Single-arm dumbbell row, underhand grip', '3x10-12/side', gsearch('underhand dumbbell row')],
      ['Lateral raise + rear delt fly (superset)', '3x15 each', gsearch('dumbbell rear delt fly')],
      ['Hammer curl + lying dumbbell triceps extension (superset)', '3x12 each', gsearch('lying dumbbell tricep extension')],
      ['Interval finisher: burpees, jump rope, or stair sprints', '10-12 min', gsearch('burpee form')]
    ]
  },
  day5: {
    title: 'Full body metabolic + conditioning',
    duration: '35-40 min',
    gym: [
      ['Kettlebell swings', '4x15', 'https://www.muscleandstrength.com/exercises/kettlebell-swing'],
      ['Push press', '3x8', gsearch('push press')],
      ['Renegade rows', '3x10/side', 'https://www.muscleandstrength.com/exercises/renegade-row'],
      ['Med-ball rotational throws', '3x10/side', gsearch('medicine ball rotational throw')],
      ['Circuit: sled push / battle ropes / bike sprints', '15 min', null]
    ],
    home: [
      ['Single dumbbell swing (hinge, swing between legs)', '4x15', 'https://www.muscleandstrength.com/exercises/kettlebell-swing'],
      ['Dumbbell push press', '3x8', gsearch('dumbbell push press')],
      ['Renegade rows', '3x10/side', 'https://www.muscleandstrength.com/exercises/renegade-row'],
      ['Weighted Russian twists', '3x15/side', gsearch('russian twist')],
      ['Bodyweight circuit: burpees, jump squats, mountain climbers, high knees', '15 min', gsearch('burpee jump squat mountain climber high knees')]
    ]
  },
  backcare: {
    intro: 'Tennis loads the lower back through rotation, serving (extension), and lateral movement — if it\'s tight or achy afterward, that\'s usually the surrounding muscles (core, glutes, hips) not doing their share. This builds that support without adding more spinal load. This is general supportive work, not treatment — if pain is sharp, radiates down a leg, comes with numbness/tingling, or persists or worsens over a few days, see a doctor or physiotherapist.',
    sections: [
      {
        title: 'Pre-tennis warm-up (5 min, before you play)',
        items: [
          ['Cat-cow', '10 reps', gsearch('cat cow stretch')],
          ['Kneeling hip flexor stretch', '30s/side', gsearch('kneeling hip flexor stretch')],
          ['90/90 hip rotations', '8/side', gsearch('90 90 hip stretch')],
          ['Glute bridge', '12 reps', gsearch('glute bridge')]
        ]
      },
      {
        title: 'Core stability block (2-3x/week, e.g. after Day 3 or Day 5)',
        items: [
          ['Dead bug', '3x10/side', gsearch('dead bug exercise')],
          ['Bird dog', '3x8/side', gsearch('bird dog exercise')],
          ['Side plank', '3x20-30s/side', gsearch('side plank')],
          ['Pallof press (band or cable)', '3x10/side', gsearch('pallof press')],
          ['Single-leg glute bridge', '3x12/side', gsearch('single leg glute bridge')]
        ]
      },
      {
        title: 'Post-tennis cool-down stretch (5 min, right after playing)',
        items: [
          ["Child's pose", '30-45s', gsearch('childs pose stretch')],
          ['Knee-to-chest', '30s/side', gsearch('knee to chest stretch')],
          ['Seated spinal twist', '30s/side', gsearch('seated spinal twist')],
          ['Piriformis stretch (figure-4)', '30s/side', gsearch('piriformis stretch figure 4')]
        ]
      }
    ],
    tightNote: 'On days the back feels tight or sore: ease off spinal-loaded moves rather than pushing through them — swap Romanian deadlift / deadlift / kettlebell swings for a goblet squat or leg press pattern that day. Keep the core stability block — it tends to help tightness rather than aggravate it. If it\'s not better within a few days, or gets worse, get it looked at.'
  }
};

const PLAN_P2 = null; // no plan added yet for Partner

let activePerson = 'p1';
let activeDay = 'overview';
let activeVariant = 'gym';

function currentPlan() { return activePerson === 'p1' ? PLAN_P1 : PLAN_P2; }

function renderPersonTabs() {
  const el = document.getElementById('personTabs');
  el.innerHTML = `
    <button data-p="p1" class="${activePerson === 'p1' ? 'active' : ''}">You</button>
    <button data-p="p2" class="${activePerson === 'p2' ? 'active' : ''}">Partner</button>
  `;
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { activePerson = b.dataset.p; renderAll(); });
  });
}

function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = DAY_ORDER.map(d => `<button data-d="${d}" class="${activeDay === d ? 'active' : ''}">${DAY_LABELS[d]}</button>`).join('');
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { activeDay = b.dataset.d; activeVariant = 'gym'; renderContent(); updateActiveTabStyles(); });
  });
}

function updateActiveTabStyles() {
  document.querySelectorAll('#dayTabs button').forEach(b => b.classList.toggle('active', b.dataset.d === activeDay));
}

function exRow([name, reps, url]) {
  const link = url
    ? `<span class="ex-link"><a href="${url}" target="_blank" rel="noopener">${url.includes('google.com') ? '🔍 Search' : '▶ Watch'}</a></span>`
    : '';
  return `<div class="ex-row"><span class="ex-name">${name}</span><span class="ex-reps">${reps}</span>${link}</div>`;
}

function renderOverview(plan) {
  return `
    <h2>Overview</h2>
    <p class="card-sub">${plan.goal}</p>
    <div class="section-title">Flexible scheduling rules</div>
    <ul class="rule-list">${plan.rules.map(r => `<li>${r}</li>`).join('')}</ul>
    <div class="section-title">Muscle frequency check</div>
    <table class="freq-table">
      <tr><th>Muscle group</th><th>Hit on</th><th>Frequency</th></tr>
      ${plan.frequency.map(row => `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`).join('')}
    </table>
    <div class="section-title">Notes</div>
    <ul class="rule-list">${plan.notes.map(n => `<li>${n}</li>`).join('')}</ul>
  `;
}

function renderDay(day) {
  const hasVariants = !!(day.gym && day.home);
  const list = hasVariants ? (activeVariant === 'gym' ? day.gym : day.home) : day.gym;
  return `
    <h2>${day.title}</h2>
    <p class="card-sub">${day.duration}</p>
    ${hasVariants ? `
      <div class="variant-tabs">
        <button id="variantGym" class="${activeVariant === 'gym' ? 'active' : ''}">Gym</button>
        <button id="variantHome" class="${activeVariant === 'home' ? 'active' : ''}">Home (dumbbell)</button>
      </div>` : ''}
    ${list.map(exRow).join('')}
    ${day.footnote ? `<p class="note" style="margin-top:12px;">${day.footnote}</p>` : ''}
  `;
}

function renderBackCare(bc) {
  return `
    <h2>Back care</h2>
    <p class="card-sub">${bc.intro}</p>
    ${bc.sections.map(s => `
      <div class="section-title">${s.title}</div>
      ${s.items.map(exRow).join('')}
    `).join('')}
    <p class="note" style="margin-top:14px;">${bc.tightNote}</p>
  `;
}

function renderContent() {
  const plan = currentPlan();
  const contentEl = document.getElementById('content');
  if (!plan) {
    contentEl.innerHTML = `<div class="empty-state">No training plan added for Partner yet.</div>`;
    return;
  }
  if (activeDay === 'overview') {
    contentEl.innerHTML = renderOverview(plan.overview);
  } else if (activeDay === 'backcare') {
    contentEl.innerHTML = renderBackCare(plan.backcare);
  } else {
    contentEl.innerHTML = renderDay(plan[activeDay]);
    const gymBtn = document.getElementById('variantGym');
    const homeBtn = document.getElementById('variantHome');
    if (gymBtn) gymBtn.addEventListener('click', () => { activeVariant = 'gym'; renderContent(); });
    if (homeBtn) homeBtn.addEventListener('click', () => { activeVariant = 'home'; renderContent(); });
  }
}

function renderAll() {
  renderPersonTabs();
  renderDayTabs();
  renderContent();
}

renderAll();
</script>
</body>
</html>
